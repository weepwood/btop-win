name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Apply rustfmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all

      - name: Capture rustfmt patch
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: git diff --no-ext-diff > rustfmt.patch

      - name: Clippy
        shell: bash
        run: |
          set +e
          cargo clippy --quiet --all-targets --all-features -- -D warnings > clippy.log 2>&1
          status=$?
          cat clippy.log
          exit $status

      - name: Test
        run: cargo test --quiet --all-features

      - name: Release build
        if: matrix.os == 'windows-latest'
        run: cargo build --quiet --release

      - name: Verify formatting
        if: matrix.os == 'ubuntu-latest'
        run: git diff --exit-code

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.os }}
          path: |
            clippy.log
            rustfmt.patch
          if-no-files-found: ignore
          retention-days: 3
