name: Theme diagnostics

on:
  push:
    branches:
      - feat/btop-inspired-theme

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/btop-inspired-theme
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Apply and commit rustfmt
        shell: bash
        run: |
          cargo fmt --all
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src
            git commit -m "style: apply rustfmt"
            git push origin HEAD:feat/btop-inspired-theme
          fi

      - name: Run Clippy diagnostics
        id: clippy
        shell: bash
        run: |
          set +e
          cargo clippy --all-targets --all-features -- -D warnings > clippy.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run test diagnostics
        id: tests
        shell: bash
        run: |
          set +e
          cargo test --all-features > test.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post diagnostic summary
        if: steps.clippy.outputs.code != '0' || steps.tests.outputs.code != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Theme diagnostics'
            echo
            echo "Clippy exit: ${{ steps.clippy.outputs.code }}"
            echo "Tests exit: ${{ steps.tests.outputs.code }}"
            echo
            echo '### Clippy'
            echo '```text'
            tail -n 120 clippy.log
            echo '```'
            echo
            echo '### Tests'
            echo '```text'
            tail -n 80 test.log
            echo '```'
          } > diagnostics.md
          gh pr comment 7 --body-file diagnostics.md

      - name: Verify diagnostics
        shell: bash
        run: |
          test "${{ steps.clippy.outputs.code }}" = "0"
          test "${{ steps.tests.outputs.code }}" = "0"
